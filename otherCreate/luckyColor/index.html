<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../common/reset.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+1:wght@100..900&family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/style.css">
    <title>テンプレート</title>
</head>
<body class="bgColor" id="bgColor">
    <main class="wrapper">
        <div class="wLeft">
            <div class="colorRandom">
                <p class="colorEx">ランダムにカラー設定</p>
                <div class="colorBox" id="colorBox"></div><div class="todayBlock">
                <p class="todayColor">透明度</p>
                    <select  name="opocity" id="opocity" class="passion">
                        <option value="1.0">1.0</option>
                        <option value="0.9">0.9</option>
                        <option value="0.8">0.8</option>
                        <option value="0.7">0.7</option>
                        <option value="0.6">0.6</option>
                        <option value="0.5">0.5</option>
                        <option value="0.4">0.4</option>
                        <option value="0.3">0.3</option>
                        <option value="0.2">0.2</option>
                        <option value="0.1">0.1</option>
                        <option value="0">0</option>
                    </select>
            </div>
                <button id="cButton" class="colorButton">スタート</button>
                <p class="colorEx">カラーコード<br>RED・GREEN・BLUE</p>
            </div>
            <div class="rgb">
                <p id="redBox" class="numberBox"></p>
                <p id="greenBox" class="numberBox"></p>
                <p id="blueBox" class="numberBox"></p>
            </div>
            <div class="pasteBlock">
                <div class="rgbaBlock">
                    <p class="rgbaCode" id="rgbaCode">rgbaカラーコード</p>
                    <button class="rgbaPaste" id="rgbaPaste">コピー</button>
                </div>
                <div class="rgbBlock">
                    <p class="rgbCode" id="rgbCode">rgbカラーコード</p>
                    <button class="rgbPaste" id="rgbPaste">コピー</button>
                </div>
            </div>
        </div>
        <div class="exBlock">
            <div class="exText">ランダムにカラーを算出します</div>
            <div class="exText">透明度の調整と、rgb,と16bitの値はコピーボタンでコピペできます。</div>
            <div class="messageWindow" id="messageWindow">メッセージウインドウ。<br>色の履歴が出てきます。<span class="blinking">＿</span><br></div>
        </div>
    </main>
    <script src="scripts/script.js"></script>
</body>
</html>
